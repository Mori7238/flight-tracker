<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Flight Tracker</title>

    <!-- MAP LIB -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0b0f1a;
            color: white;
        }

        .header {
            padding: 15px;
            text-align: center;
            background: #121829;
        }

        /* MAP */
        #map {
            height: 75vh;
            width: 100%;
        }

        /* GRID */
        .container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            padding: 10px;
        }

        /* มือถือ */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .card {
            background: #161c2f;
            padding: 8px;
            border-radius: 10px;
        }

        input {
            width: 100%;
            padding: 6px;
            border-radius: 5px;
            border: none;
        }

        .label {
            font-size: 11px;
            opacity: 0.7;
        }

        .status {
            font-size: 12px;
        }

        .scheduled {
            color: orange;
        }

        .airborne {
            color: #00ffcc;
        }

        .landed {
            color: lightgreen;
        }

        .track-btn {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 25px;
            background: gold;
            border: none;
            border-radius: 20px;
        }

        .plane {
            font-size: 18px;
            transition: transform 0.3s linear;
            transform-origin: center;
        }

        #dashboard {
            padding: 10px;
        }

        .flight {
            background: #161c2f;
            margin-bottom: 8px;
            padding: 10px;
            border-radius: 10px;
        }

        .flight.green {
            border-left: 5px solid lime;
        }

        .flight.yellow {
            border-left: 5px solid gold;
        }

        .flight.red {
            border-left: 5px solid red;
            background: #2a1a1a;
        }

        #followPanel {
            position: fixed;
            bottom: 80px;
            left: 10px;
            right: 10px;
            background: #121829;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
            font-size: 14px;
            z-index: 9999;
        }
    </style>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b0f1a">
    <link rel="apple-touch-icon" href="icon.png">



</head>

<body>

    <div class="header">✈️ Flight Alert Tracker</div>

    <div id="map"></div>

    <div id="dashboard"></div>

    <div id="followPanel" style="display:none;"></div>

    <div class="container" id="app"></div>

    <button class="track-btn" onclick="track()">Start Tracking</button>

    <script>

        // ===== GLOBAL =====
        let map
        let lastKnown = {}
        let lastStatus = {}
        let markers = {}
        let velocity = {}
        let routes = {}
        let alerted = {}
        let lastPos = {}
        let trails = {}
        let dashboardData = []
        let followTarget = null
        let followData = null
        let targetPlane = null

        let camLat = 0
        let camLon = 0
        let camZoom = 6

        let smoothFactor = 0.01   // 🔥 ยิ่งน้อย = ยิ่งลื่น (แนะนำ 0.05–0.1)


        let flights = {
            "SL502": { dep: "06:15", arr: "07:30", route: "DMK → CNX" },
            "SL504": { dep: "10:05", arr: "11:20", route: "DMK → CNX" },
            "SL506": { dep: "10:30", arr: "11:45", route: "DMK → CNX" },
            "SL518": { dep: "18:05", arr: "19:20", route: "DMK → CNX" },
            "SL520": { dep: "19:35", arr: "20:45", route: "DMK → CNX" }
        }

        let airport = {
            CNX: { lat: 18.7883, lon: 98.9853 },
            DMK: { lat: 13.9126, lon: 100.6067 }
        }

        // ===== NOTI =====
        if ("Notification" in window) {
            Notification.requestPermission()
        }

        function notify(msg) {
            if (Notification.permission === "granted") {
                new Notification(msg)
            }
        }

        // ===== ONLOAD =====
        window.onload = function () {

            // create input
            for (let i = 0; i < 15; i++) {
                document.getElementById("app").innerHTML += `
        <div class="card">
            <input id="f${i}" placeholder="SL502">
            <div id="info${i}" class="label">-</div>
            <div id="s${i}" class="status">Not tracked</div>
        </div>`
            }

            loadInputs()

            autoFillFlights()

            // ===== MAP INIT =====
            navigator.geolocation.getCurrentPosition(function (pos) {
                initMap(pos.coords.latitude, pos.coords.longitude, 7)
            }, function () {
                initMap(18.7883, 98.9853, 6)
            })

            setInterval(track, 30000)
            setInterval(updateMap, 30000)

            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js')
            }
        }

        // ===== MAP =====
        function initMap(lat, lon, zoom) {

            map = L.map('map').setView([lat, lon], zoom)

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map)

            L.marker([lat, lon]).addTo(map).bindPopup("📍 You")

            setTimeout(() => {
                map.invalidateSize()
            }, 500)
        }

        // ===== SAVE =====
        function saveInputs() {
            let arr = []
            for (let i = 0; i < 15; i++) {
                arr.push(document.getElementById("f" + i).value)
            }
            localStorage.setItem("flights", JSON.stringify(arr))
        }

        // ===== LOAD =====
        function loadInputs() {
            let arr = JSON.parse(localStorage.getItem("flights") || "[]")
            arr.forEach((v, i) => {
                if (v) document.getElementById("f" + i).value = v
            })
        }

        // ===== TRACK =====
        function track() {

            saveInputs()

            let now = new Date()
            let current = now.getHours() * 60 + now.getMinutes()

            for (let i = 0; i < 15; i++) {
                let f = document.getElementById("f" + i).value.toUpperCase()

                if (f && flights[f]) {

                    let data = flights[f]
                    let depMin = data.dep.split(":")[0] * 60 + parseInt(data.dep.split(":")[1])
                    let arrMin = data.arr.split(":")[0] * 60 + parseInt(data.arr.split(":")[1])

                    let el = document.getElementById("s" + i)
                    let info = document.getElementById("info" + i)

                    info.innerText = `${f} | ${data.route} | ${data.dep}-${data.arr}`

                    let status = ""

                    if (current < depMin) {
                        status = "Scheduled"
                        el.innerText = "🟡 Scheduled"
                    } else if (current <= arrMin) {
                        status = "Airborne"
                        el.innerText = "✈️ Airborne"
                    } else {
                        status = "Landed"
                        el.innerText = "🛬 Landed"
                    }

                    if (status === "Airborne" && lastStatus[i] !== "Airborne") {
                        notify(f + " ✈️ Takeoff")
                    }

                    lastStatus[i] = status
                }
            }
        }



        // ===== GOOGLE SHEET LOAD =====
        async function loadFlightsFromSheet() {

            let url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRmF01k3SpeWAIvdS4PyliR3DimewuhV3s41Un6uQY92iw76PSy6bhKWoUcFqN0f8jkBHN6YDrcE9qN/pub?gid=0&single=true&output=csv"

            let res = await fetch(url)
            let text = await res.text()

            let rows = text.split("\n")

            let flightList = []

            rows.forEach((r, index) => {

                let cols = r.split(",")

                // ข้าม header
                if (index === 0) return

                let flt = cols[1]?.trim()

                if (flt && flt.includes("SL")) {
                    flightList.push(flt)
                }

            })

            console.log("CSV RAW:", rows)
            console.log("FLIGHTS:", flightList)

            return flightList
        }

        // ===== AUTO FILL =====
        async function autoFillFlights() {

            let list = await loadFlightsFromSheet()

            console.log("โหลดจาก Google Sheet:", list)

            for (let i = 0; i < list.length && i < 15; i++) {
                document.getElementById("f" + i).value = list[i]
            }

            console.log("โหลดจาก Google Sheet:", list)
        }

        // ===== MAP UPDATE (FINAL PRO) =====
        async function updateMap() {

            let planes = []   // 👈 ต้องอยู่นอก try

            try {
                let res = await fetch("/.netlify/functions/adsb")

                if (!res.ok) {
                    console.log("API status error:", res.status)
                    return
                }

                let data = await res.json()

                if (Array.isArray(data.states)) {
                    planes = data.states
                } else if (Array.isArray(data.ac)) {
                    planes = data.ac
                } else {
                    console.log("Unknown format:", data)
                    return
                }

                console.log("planes:", planes.length)
                console.log("sample plane:", planes[0])

                console.log("planes:", planes.length)

                console.log("sample plane:", planes[0])

            } catch (e) {
                console.log("API error", e)
                return
            }

            // ===== ถ้าไม่มีเครื่อง =====
            if (planes.length === 0) {
                console.log("No planes right now")
                return
            }

            let active = {}
            dashboardData = []

            planes.forEach(p => {

                let callsign = (p[1] || p.flight || p.hex || "UNK").toString().trim()
                let lon = p[5] ?? p.lon
                let lat = p[6] ?? p.lat
                let alt = p[7] ?? p.alt_baro ?? 0
                let velocity = p[9] ?? p.gs ?? 0
                let heading = p[10] ?? p.track ?? 0

                let speedKmh = velocity * 3.6

                if (lat == null || lon == null) return

                //if (lat < 5 || lat > 25 || lon < 95 || lon > 110) return

                // ===== FILTER USER INPUT =====
                let match = false
                for (let i = 0; i < 15; i++) {
                    let f = document.getElementById("f" + i).value.toUpperCase()
                    if (f && callsign.includes(f)) {
                        match = true
                        break
                    }
                }

                //if (!match) return

                active[callsign] = true

                // ===== SMOOTH =====
                if (lastPos[callsign]) {
                    let old = lastPos[callsign]
                    lat = old.lat + (lat - old.lat) * 0.3
                    lon = old.lon + (lon - old.lon) * 0.3
                }
                lastPos[callsign] = { lat, lon }

                let target = airport["CNX"]
                let distToAirport = getDistance(lat, lon, target.lat, target.lon)
                let eta = calculateETA(lat, lon, target.lat, target.lon, speedKmh)

                dashboardData.push({
                    callsign,
                    alt,
                    speed: Math.round(speedKmh),
                    eta,
                    dist: distToAirport
                })

                // ===== TRAIL =====
                if (!trails[callsign]) {
                    trails[callsign] = L.polyline([], { weight: 2, color: "lime" }).addTo(map)
                }

                trails[callsign].addLatLng([lat, lon])

                // ===== MARKER =====
                if (markers[callsign]) {

                    markers[callsign].setLatLng([lat, lon])

                    if (followTarget === callsign) {
                        map.setView([lat, lon], map.getZoom())
                    }

                    let el = markers[callsign].getElement()
                    if (el) {
                        el.style.transform = `rotate(${heading}deg)`
                    }

                } else {

                    let planeIcon = L.divIcon({
                        html: `
                        <div style="
                        transform: rotate(${heading}deg);
                        width: 20px;
                        height: 20px;
                        ">
                        <svg viewBox="0 0 24 24" fill="lime">
                        <path d="M2 16l20-4-20-4v3l15 1-15 1z"/>
                        </svg>
                        </div>
                        `,
                        className: '',
                        iconSize: [20, 20]
                    })

                    markers[callsign] = L.marker([lat, lon], { icon: planeIcon })
                        .addTo(map)
                        .bindPopup(callsign)
                        .on("click", () => followFlight(callsign, {
                            alt,
                            speed: Math.round(speedKmh),
                            eta
                        }))
                }

            })

            // ===== CLEAN =====
            Object.keys(markers).forEach(cs => {
                if (!active[cs]) {
                    map.removeLayer(markers[cs])
                    delete markers[cs]
                }
            })

            renderDashboard()
        }


        function getDistance(lat1, lon1, lat2, lon2) {
            let R = 6371
            let dLat = (lat2 - lat1) * Math.PI / 180
            let dLon = (lon2 - lon1) * Math.PI / 180

            let a =
                Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                Math.cos(lat1 * Math.PI / 180) *
                Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLon / 2) * Math.sin(dLon / 2)

            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a))
        }
        function calculateETA(lat, lon, targetLat, targetLon, speedKmh) {

            let dist = getDistance(lat, lon, targetLat, targetLon)

            if (speedKmh <= 0) return null

            let hours = dist / speedKmh

            return Math.round(hours * 60) // นาที
        }


        function detectFlightStatus(callsign, lat, lon, alt) {

            let airports = [
                { name: "CNX", lat: 18.7883, lon: 98.9853 },
                { name: "DMK", lat: 13.9126, lon: 100.6067 }
            ]

            airports.forEach(a => {

                let dist = getDistance(lat, lon, a.lat, a.lon)

                let key = callsign + "_takeoff"

                if (alt > 1000) {
                    if (!alerted[key] || Date.now() - alerted[key] > 600000) {
                        notify(callsign + " 🚀 Takeoff จริง")
                        alerted[key] = Date.now()
                    }
                }

                if (dist < 0.5 && alt < 3000 && !alerted[callsign + "_soon"]) {
                    notify(callsign + " ⏳ ใกล้ถึง " + a.name)
                    alerted[callsign + "_soon"] = true
                }

                if (dist < 0.2 && alt < 1000 && !alerted[callsign + "_land"]) {
                    notify(callsign + " 🛬 Landing " + a.name)
                    alerted[callsign + "_land"] = true
                }

            })
        }
        function followFlight(callsign, data) {
            followTarget = callsign
            followData = data

            document.getElementById("followPanel").style.display = "block"
        }

        function renderDashboard() {

            let box = document.getElementById("dashboard")

            dashboardData.sort((a, b) => {
                if (a.eta == null) return 1
                if (b.eta == null) return -1
                return a.eta - b.eta
            })

            let html = "<h3>✈️ Flight Dashboard</h3>"

            dashboardData.forEach((f, i) => {

                let statusClass = "green"
                if (f.alt < 3000) statusClass = "yellow"
                if (f.alt < 1000) statusClass = "red"

                let highlight = ""
                if (i === 0) {
                    highlight = "style='box-shadow: 0 0 10px gold;'"
                }

                html += `
                  <div class="flight ${statusClass}" 
                 onclick="followFlight('${f.callsign}', {alt:${f.alt}, speed:${f.speed}, eta:${f.eta}})">
                <b>${f.callsign}</b><br>
                 Alt: ${Math.round(f.alt)}<br>
                 Speed: ${f.speed} km/h<br>
                 ETA: ${f.eta ? f.eta + " min" : "-"}
                </div>
                 `
            })

            box.innerHTML = html
        }



    </script>


</body>

</html>
